<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🌿 WaldLern A1 • Beautiful German Course</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2e1f 0%, #1a3a2a 50%, #0d2818 100%);
      color: #e8f5e9;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background leaves */
    .bg-leaf {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .bg-leaf i {
      position: absolute;
      color: rgba(76, 175, 80, 0.08);
      font-size: 60px;
      animation: floatLeaf 20s infinite linear;
    }
    
    @keyframes floatLeaf {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 40px;
    }

    /* Glassmorphism Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeInDown 0.8s ease;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #c8e6c9, #81c784, #4caf50);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .header .subtitle {
      color: #a5d6a7;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeInUp 0.6s ease backwards;
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(76,175,80,0.5);
    }

    .stat-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #a5d6a7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #c8e6c9;
      margin-top: 5px;
    }

    /* Progress Section */
    .progress-section {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .progress-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .progress-percent {
      font-size: 1.5rem;
      font-weight: 700;
      color: #81c784;
    }

    .progress-bar-container {
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      height: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #4caf50, #81c784, #a5d6a7);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Modules Grid */
    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title i {
      background: rgba(76,175,80,0.2);
      padding: 8px;
      border-radius: 50%;
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .module-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeInUp 0.6s ease backwards;
    }

    .module-card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255,255,255,0.1);
      border-color: rgba(76,175,80,0.5);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .module-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .module-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .module-progress {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #a5d6a7;
      margin-bottom: 8px;
    }

    .module-progress-bar {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      height: 6px;
      overflow: hidden;
    }

    .module-progress-fill {
      background: linear-gradient(90deg, #4caf50, #81c784);
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s ease;
    }

    /* Daily Section */
    .daily-section {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 28px;
      margin-top: 20px;
    }

    .daily-tasks {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
    }

    .daily-task {
      background: rgba(255,255,255,0.08);
      border-radius: 60px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
      flex: 1;
      min-width: 180px;
    }

    .daily-task:hover {
      background: rgba(76,175,80,0.2);
      transform: scale(1.02);
    }

    .daily-task.completed {
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      border-color: #81c784;
    }

    .task-icon {
      font-size: 1.2rem;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(135deg, #1a3a2a, #0f2e1f);
      border-radius: 40px;
      max-width: 850px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid rgba(76,175,80,0.3);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .modal-header {
      padding: 24px 28px;
      background: rgba(76,175,80,0.1);
      border-bottom: 1px solid rgba(76,175,80,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }

    .modal-header h2 {
      font-size: 1.5rem;
    }

    .close-modal {
      background: none;
      border: none;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .close-modal:hover {
      transform: scale(1.1);
    }

    .modal-body {
      padding: 28px;
    }

    /* Lesson Items */
    .lesson-item {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .lesson-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .lesson-header:hover {
      background: rgba(255,255,255,0.05);
    }

    .lesson-title {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 500;
    }

    .lesson-check {
      width: 28px;
      height: 28px;
      border: 2px solid #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lesson-check.completed {
      background: #4caf50;
      box-shadow: 0 0 10px rgba(76,175,80,0.5);
    }

    .expand-icon {
      transition: transform 0.3s;
    }

    .lesson-content {
      display: none;
      padding: 0 22px 22px 22px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .lesson-content.active {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Content Styling */
    .grammar-box {
      background: rgba(76,175,80,0.1);
      border-radius: 20px;
      padding: 18px;
      margin: 16px 0;
      border-left: 4px solid #4caf50;
    }

    .vocab-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .vocab-card {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      transition: transform 0.2s;
    }

    .vocab-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
    }

    .vocab-german {
      font-weight: 700;
      color: #81c784;
      font-size: 1rem;
    }

    .vocab-english {
      font-size: 0.75rem;
      color: #a5d6a7;
      margin-top: 4px;
    }

    .examples {
      background: rgba(0,0,0,0.2);
      border-radius: 20px;
      padding: 18px;
      margin: 16px 0;
    }

    .example-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .example-item:last-child {
      border-bottom: none;
    }

    .german {
      color: #81c784;
      font-weight: 500;
    }

    .exercise {
      background: rgba(255,152,0,0.1);
      border-radius: 20px;
      padding: 18px;
      margin: 16px 0;
    }

    .exercise-input {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(76,175,80,0.3);
      border-radius: 16px;
      color: white;
      font-size: 1rem;
      margin-top: 10px;
    }

    .exercise-input:focus {
      outline: none;
      border-color: #4caf50;
    }

    .btn {
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(76,175,80,0.3);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      color: #81c784;
      padding: 14px 24px;
      border-radius: 60px;
      z-index: 1100;
      animation: slideInRight 0.3s ease;
      border: 1px solid #4caf50;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f2e1f;
    }

    ::-webkit-scrollbar-thumb {
      background: #4caf50;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #81c784;
    }

    textarea {
      width: 100%;
      padding: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(76,175,80,0.3);
      border-radius: 20px;
      color: white;
      font-family: inherit;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: #4caf50;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>

<div class="bg-leaf" id="bgLeaves"></div>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-tree"></i> WaldLern A1</h1>
    <p class="subtitle">
      <i class="fas fa-leaf"></i> Complete Beginner German Course 
      <i class="fas fa-feather-alt"></i> 12 Modules • 35+ Lessons • Interactive Learning
    </p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-star"></i></div>
      <div class="stat-value" id="xpValue">0</div>
      <div class="stat-label">Total XP</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-fire"></i></div>
      <div class="stat-value" id="streakValue">0</div>
      <div class="stat-label">Day Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="stat-value" id="lessonsCompleted">0</div>
      <div class="stat-label">Lessons Mastered</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-trophy"></i></div>
      <div class="stat-value" id="levelValue">🌱</div>
      <div class="stat-label">Level</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title"><i class="fas fa-chart-line"></i> Your Journey to German Fluency</span>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="globalProgress"></div>
    </div>
  </div>

  <div class="section-title">
    <i class="fas fa-cubes"></i>
    <span>Learning Modules</span>
  </div>
  <div class="modules-grid" id="modulesGrid"></div>

  <div class="daily-section">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
      <i class="fas fa-sun" style="font-size: 1.5rem;"></i>
      <h3 style="font-weight: 600;">Daily Forest Rituals</h3>
    </div>
    <div class="daily-tasks" id="dailyTasks"></div>
    <div style="margin-top: 20px;">
      <textarea id="reflectionInput" rows="2" placeholder="📝 Write your daily reflection here... What did you learn today? What was challenging?"></textarea>
      <div style="display: flex; gap: 12px; margin-top: 12px;">
        <button class="btn" id="saveReflectionBtn"><i class="fas fa-save"></i> Save Reflection</button>
        <button class="btn" id="resetDailyBtn" style="background: rgba(255,255,255,0.1);"><i class="fas fa-sync-alt"></i> Reset Daily</button>
      </div>
    </div>
  </div>
</div>

<div id="moduleModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">Module</h2>
      <button class="close-modal">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  // Generate floating leaves
  for (let i = 0; i < 20; i++) {
    const leaf = document.createElement('i');
    leaf.className = 'fas fa-leaf';
    leaf.style.left = Math.random() * 100 + '%';
    leaf.style.animationDelay = Math.random() * 20 + 's';
    leaf.style.animationDuration = 15 + Math.random() * 20 + 's';
    leaf.style.fontSize = 20 + Math.random() * 40 + 'px';
    leaf.style.opacity = 0.1 + Math.random() * 0.2;
    document.getElementById('bgLeaves').appendChild(leaf);
  }

  // ==================== COMPLETE A1 CURRICULUM ====================
  const MODULES = [
    {
      id: 1, icon: "🇩🇪", emoji: "👋", color: "#4caf50",
      title: "Greetings & Introductions",
      lessons: [
        { title: "Basic Greetings (Hallo, Guten Tag)", grammar: "Memorize these essential greetings - they're the key to every conversation!", vocab: [{de:"Hallo",en:"Hello"},{de:"Guten Morgen",en:"Good morning"},{de:"Guten Tag",en:"Good day"},{de:"Guten Abend",en:"Good evening"},{de:"Tschüss",en:"Bye"}], examples: [{de:"Hallo, wie geht es dir?",en:"Hello, how are you?"}], exercise: {q:"How do you say 'Good morning' in German?", a:"Guten Morgen"} },
        { title: "Introducing Yourself", grammar: "'heißen' means 'to be called'", vocab: [{de:"ich heiße",en:"my name is"},{de:"mein Name ist",en:"my name is"},{de:"ich bin",en:"I am"}], examples: [{de:"Ich heiße Thomas",en:"My name is Thomas"}], exercise: {q:"Say 'My name is' in German", a:"ich heiße"} },
        { title: "Asking 'How are you?'", grammar: "The dative case appears here", vocab: [{de:"Wie geht es dir?",en:"How are you?"},{de:"Mir geht es gut",en:"I'm doing well"}], examples: [{de:"Wie geht's? – Gut, danke!",en:"How's it going? – Good, thanks!"}], exercise: {q:"How do you say 'I'm doing well'?", a:"Mir geht es gut"} }
      ]
    },
    {
      id: 2, icon: "🔢", emoji: "🔢", color: "#2196f3",
      title: "Numbers, Days & Months",
      lessons: [
        { title: "Numbers 0-20", grammar: "Essential for telling time and prices", vocab: Array.from({length:21}, (_,i) => ({de: i===0?"null":i===1?"eins":i===2?"zwei":i===3?"drei":i===4?"vier":i===5?"fünf":i===6?"sechs":i===7?"sieben":i===8?"acht":i===9?"neun":i===10?"zehn":i===11?"elf":i===12?"zwölf":i===13?"dreizehn":i===14?"vierzehn":i===15?"fünfzehn":i===16?"sechzehn":i===17?"siebzehn":i===18?"achtzehn":i===19?"neunzehn":i===20?"zwanzig":"", en: i.toString()})).filter(v=>v.de), exercise: {q:"What is 12 in German?", a:"zwölf"} },
        { title: "Days of the Week", vocab: [{de:"Montag",en:"Monday"},{de:"Dienstag",en:"Tuesday"},{de:"Mittwoch",en:"Wednesday"},{de:"Donnerstag",en:"Thursday"},{de:"Freitag",en:"Friday"},{de:"Samstag",en:"Saturday"},{de:"Sonntag",en:"Sunday"}], examples: [{de:"Heute ist Montag",en:"Today is Monday"}], exercise: {q:"What is 'Wednesday' in German?", a:"Mittwoch"} },
        { title: "Months & Seasons", vocab: [{de:"Januar",en:"January"},{de:"Februar",en:"February"},{de:"März",en:"March"},{de:"April",en:"April"},{de:"Mai",en:"May"},{de:"Juni",en:"June"},{de:"Juli",en:"July"},{de:"August",en:"August"},{de:"September",en:"September"},{de:"Oktober",en:"October"},{de:"November",en:"November"},{de:"Dezember",en:"December"},{de:"Frühling",en:"Spring"},{de:"Sommer",en:"Summer"},{de:"Herbst",en:"Autumn"},{de:"Winter",en:"Winter"}], exercise: {q:"What is 'March' in German?", a:"März"} }
      ]
    },
    {
      id: 3, icon: "📝", emoji: "📝", color: "#ff9800",
      title: "Sentence Structure",
      lessons: [
        { title: "Subject-Verb-Object", grammar: "The verb is ALWAYS in second position!", vocab: [{de:"ich",en:"I"},{de:"du",en:"you"},{de:"er/sie/es",en:"he/she/it"},{de:"wir",en:"we"},{de:"ihr",en:"you all"}], examples: [{de:"Ich lerne Deutsch",en:"I learn German"}], exercise: {q:"In a main clause, what position is the verb?", a:"second"} },
        { title: "Yes/No Questions", grammar: "Put the verb FIRST to form a question", vocab: [{de:"Ja",en:"Yes"},{de:"Nein",en:"No"}], examples: [{de:"Lernst du Deutsch?",en:"Do you learn German?"}], exercise: {q:"What comes first in a yes/no question?", a:"verb"} }
      ]
    },
    {
      id: 4, icon: "⚙️", emoji: "⚙️", color: "#9c27b0",
      title: "Regular Verbs",
      lessons: [
        { title: "Present Tense Conjugation", grammar: "Drop -en, add: -e, -st, -t, -en, -t, -en", vocab: [{de:"machen",en:"to do/make"},{de:"lernen",en:"to learn"},{de:"wohnen",en:"to live"}], examples: [{de:"Ich mache Hausaufgaben",en:"I do homework"},{de:"Du lernst Deutsch",en:"You learn German"}], exercise: {q:"What ending for 'ich'?", a:"-e"} },
        { title: "Common Regular Verbs", vocab: [{de:"spielen",en:"to play"},{de:"arbeiten",en:"to work"},{de:"sagen",en:"to say"},{de:"fragen",en:"to ask"}], examples: [{de:"Wir spielen Fußball",en:"We play soccer"}], exercise: {q:"Conjugate 'spielen' for 'wir'", a:"spielen"} }
      ]
    },
    {
      id: 5, icon: "✨", emoji: "✨", color: "#e91e63",
      title: "sein & haben",
      lessons: [
        { title: "sein (to be)", grammar: "IRREGULAR - memorize these!", vocab: [{de:"ich bin",en:"I am"},{de:"du bist",en:"you are"},{de:"er/sie/es ist",en:"he/she/it is"},{de:"wir sind",en:"we are"},{de:"ihr seid",en:"you all are"}], examples: [{de:"Ich bin müde",en:"I am tired"}], exercise: {q:"What is 'I am'?", a:"ich bin"} },
        { title: "haben (to have)", grammar: "Irregular: ich habe, du hast, er hat", vocab: [{de:"ich habe",en:"I have"},{de:"du hast",en:"you have"},{de:"er/sie/es hat",en:"he/she/it has"}], examples: [{de:"Ich habe einen Hund",en:"I have a dog"}], exercise: {q:"What is 'you have' (du)?", a:"du hast"} }
      ]
    },
    {
      id: 6, icon: "❓", emoji: "❓", color: "#00bcd4",
      title: "Question Words",
      lessons: [
        { title: "The 7 W-Fragen", grammar: "Question word + verb + subject", vocab: [{de:"Wer?",en:"Who?"},{de:"Was?",en:"What?"},{de:"Wo?",en:"Where?"},{de:"Wann?",en:"When?"},{de:"Warum?",en:"Why?"},{de:"Wie?",en:"How?"}], examples: [{de:"Wer ist das?",en:"Who is that?"},{de:"Was machst du?",en:"What are you doing?"}], exercise: {q:"What is 'Where?' in German?", a:"Wo"} },
        { title: "Asking Why", vocab: [{de:"warum",en:"why"},{de:"weil",en:"because"}], examples: [{de:"Warum lernst du Deutsch?",en:"Why are you learning German?"}], exercise: {q:"What is 'because'?", a:"weil"} }
      ]
    },
    {
      id: 7, icon: "👨‍👩‍👧", emoji: "👨‍👩‍👧", color: "#8bc34a",
      title: "Family & Possessions",
      lessons: [
        { title: "Family Members", vocab: [{de:"die Mutter",en:"mother"},{de:"der Vater",en:"father"},{de:"die Schwester",en:"sister"},{de:"der Bruder",en:"brother"},{de:"die Oma",en:"grandma"},{de:"der Opa",en:"grandpa"}], examples: [{de:"Das ist meine Mutter",en:"That is my mother"}], exercise: {q:"What is 'sister'?", a:"die Schwester"} },
        { title: "Possessive Articles", grammar: "mein, dein, sein, ihr, unser, euer", vocab: [{de:"mein",en:"my"},{de:"dein",en:"your"},{de:"sein",en:"his"},{de:"ihr",en:"her"}], examples: [{de:"Mein Name ist Lukas",en:"My name is Lukas"}], exercise: {q:"What is 'my'?", a:"mein"} }
      ]
    },
    {
      id: 8, icon: "🍽️", emoji: "🍽️", color: "#ff5722",
      title: "Food & Ordering",
      lessons: [
        { title: "Common Foods", vocab: [{de:"das Brot",en:"bread"},{de:"der Käse",en:"cheese"},{de:"die Wurst",en:"sausage"},{de:"das Wasser",en:"water"},{de:"der Kaffee",en:"coffee"}], examples: [{de:"Ich möchte Brot, bitte",en:"I would like bread, please"}], exercise: {q:"What is 'bread'?", a:"das Brot"} },
        { title: "Ordering at a Restaurant", grammar: "Use 'ich möchte' or 'ich hätte gern'", vocab: [{de:"ich möchte",en:"I would like"},{de:"bitte",en:"please"},{de:"die Rechnung, bitte",en:"the bill, please"}], examples: [{de:"Ich möchte eine Pizza",en:"I would like a pizza"}], exercise: {q:"How do you say 'I would like'?", a:"ich möchte"} }
      ]
    },
    {
      id: 9, icon: "📍", emoji: "📍", color: "#795548",
      title: "Prepositions",
      lessons: [
        { title: "Location (Dative)", grammar: "These take DATIVE case", vocab: [{de:"in",en:"in"},{de:"auf",en:"on"},{de:"unter",en:"under"},{de:"neben",en:"next to"}], examples: [{de:"Das Buch ist auf dem Tisch",en:"The book is on the table"}], exercise: {q:"What is 'on'?", a:"auf"} },
        { title: "Direction (Accusative)", grammar: "Movement TOWARDS = Accusative", vocab: [{de:"in den/die",en:"into"},{de:"auf den/die",en:"onto"}], examples: [{de:"Ich gehe in die Schule",en:"I go into the school"}], exercise: {q:"Which case for movement?", a:"Accusative"} }
      ]
    },
    {
      id: 10, icon: "🏠", emoji: "🏠", color: "#607d8b",
      title: "The Home",
      lessons: [
        { title: "Rooms", vocab: [{de:"das Wohnzimmer",en:"living room"},{de:"die Küche",en:"kitchen"},{de:"das Schlafzimmer",en:"bedroom"},{de:"das Badezimmer",en:"bathroom"}], examples: [{de:"Das Wohnzimmer ist groß",en:"The living room is big"}], exercise: {q:"What is 'kitchen'?", a:"die Küche"} },
        { title: "Furniture", vocab: [{de:"der Tisch",en:"table"},{de:"der Stuhl",en:"chair"},{de:"das Bett",en:"bed"},{de:"der Schrank",en:"closet"}], examples: [{de:"Der Tisch ist aus Holz",en:"The table is made of wood"}], exercise: {q:"What is 'table'?", a:"der Tisch"} }
      ]
    },
    {
      id: 11, icon: "⏰", emoji: "⏰", color: "#f44336",
      title: "Telling Time",
      lessons: [
        { title: "Basic Time", grammar: "Es ist + number + Uhr", vocab: [{de:"Es ist ein Uhr",en:"It's 1:00"},{de:"halb",en:"half past"},{de:"Viertel",en:"quarter"}], examples: [{de:"Es ist drei Uhr",en:"It's 3:00"},{de:"Es ist halb vier",en:"It's 3:30"}], exercise: {q:"How do you say 'It's 2:00'?", a:"Es ist zwei Uhr"} },
        { title: "Daily Routines", vocab: [{de:"morgens",en:"in the morning"},{de:"mittags",en:"at noon"},{de:"abends",en:"in the evening"}], examples: [{de:"Ich stehe um 7 Uhr auf",en:"I get up at 7 AM"}], exercise: {q:"What does 'morgens' mean?", a:"in the morning"} }
      ]
    },
    {
      id: 12, icon: "🎯", emoji: "🎯", color: "#9e9e9e",
      title: "Final Review",
      lessons: [
        { title: "Review 1-4", examples: [{de:"Hallo! Wie heißt du?",en:"Hello! What's your name?"},{de:"Ich lerne Deutsch",en:"I learn German"}], exercise: {q:"Say 'I learn German'", a:"Ich lerne Deutsch"} },
        { title: "Review 5-8", examples: [{de:"Das ist mein Bruder",en:"That is my brother"},{de:"Ich möchte Wasser",en:"I would like water"}], exercise: {q:"Say 'I would like water'", a:"Ich möchte Wasser"} },
        { title: "Review 9-11", examples: [{de:"Die Katze ist unter dem Tisch",en:"The cat is under the table"}], exercise: {q:"Say 'It's 4:30'", a:"Es ist halb fünf"} }
      ]
    }
  ];

  const DAILY_TASKS = [
    { icon: "📖", name: "Learn 10 new words" },
    { icon: "✍️", name: "Complete a grammar exercise" },
    { icon: "🎧", name: "Listen to German (10 min)" },
    { icon: "🗣️", name: "Speak 5 sentences aloud" },
    { icon: "📝", name: "Write a sentence of the day" }
  ];

  // Data management
  let appData = { completedLessons: {}, dailyTasks: {}, streak: 0, xp: 0, lastActiveDate: null, reflections: [], dailyHistory: {} };

  function initData() {
    for (let m of MODULES) {
      for (let l = 0; l < m.lessons.length; l++) {
        let key = `${m.id}_${l}`;
        if (appData.completedLessons[key] === undefined) appData.completedLessons[key] = false;
      }
    }
    for (let i = 0; i < DAILY_TASKS.length; i++) {
      if (appData.dailyTasks[i] === undefined) appData.dailyTasks[i] = false;
    }
    checkDailyReset();
    recalcXP();
    save();
  }

  function save() { localStorage.setItem("waldlern_beauty", JSON.stringify(appData)); }
  function load() {
    let saved = localStorage.getItem("waldlern_beauty");
    if (saved) { try { let p = JSON.parse(saved); appData = { ...appData, ...p }; } catch(e) {} }
    initData();
  }

  function checkDailyReset() {
    let today = new Date().toISOString().split('T')[0];
    if (appData.lastActiveDate !== today) {
      let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      let allDone = Object.values(appData.dailyTasks).every(v=>v===true);
      if (appData.lastActiveDate === yesterday.toISOString().split('T')[0] && allDone) appData.streak++;
      else if (appData.lastActiveDate !== yesterday.toISOString().split('T')[0]) appData.streak = 0;
      else if (!allDone) appData.streak = 0;
      for (let i=0;i<DAILY_TASKS.length;i++) appData.dailyTasks[i]=false;
      appData.lastActiveDate = today;
      save();
    }
  }

  function recalcXP() {
    let total = 0;
    for (let k in appData.completedLessons) if (appData.completedLessons[k]) total += 50;
    for (let d in appData.dailyHistory) for (let t in appData.dailyHistory[d]) if (appData.dailyHistory[d][t]) total += 20;
    appData.xp = total;
    save();
  }

  function addXP(amount) {
    appData.xp += amount;
    save();
    refreshUI();
    if (amount > 0 && Math.floor(appData.xp/1000) > Math.floor((appData.xp-amount)/1000)) {
      canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
      showToast(`🎉 Level Up! You're now a stronger learner!`);
    }
  }

  function toggleLesson(moduleId, lessonIdx) {
    let key = `${moduleId}_${lessonIdx}`;
    let was = appData.completedLessons[key];
    appData.completedLessons[key] = !was;
    addXP(was ? -50 : 50);
    save();
    refreshUI();
    renderModuleModal(moduleId);
    if (!was) showToast(`✅ +50 XP! Mastered: ${MODULES.find(m=>m.id===moduleId).lessons[lessonIdx].title}`);
  }

  function toggleDailyTask(idx) {
    appData.dailyTasks[idx] = !appData.dailyTasks[idx];
    let today = new Date().toISOString().split('T')[0];
    if (!appData.dailyHistory[today]) appData.dailyHistory[today] = {};
    appData.dailyHistory[today][idx] = appData.dailyTasks[idx];
    addXP(appData.dailyTasks[idx] ? 20 : -20);
    save();
    renderDailyTasks();
    refreshUI();
    if (appData.dailyTasks[idx]) showToast(`🎯 +20 XP! ${DAILY_TASKS[idx].name}`);
  }

  function saveReflection() {
    let text = document.getElementById("reflectionInput").value;
    if (text.trim()) {
      appData.reflections.unshift({ date: new Date().toISOString().split('T')[0], text: text.slice(0, 200) });
      if (appData.reflections.length > 10) appData.reflections.pop();
      save();
      document.getElementById("reflectionInput").value = "";
      showToast("🌿 Reflection saved! Keep growing.");
    }
  }

  function getCompletedCount() { return Object.values(appData.completedLessons).filter(v=>v===true).length; }
  function getTotalLessons() { return MODULES.reduce((s,m)=>s+m.lessons.length, 0); }

  // Rendering
  function renderModules() {
    let html = "";
    for (let m of MODULES) {
      let comp = m.lessons.filter((_,i)=>appData.completedLessons[`${m.id}_${i}`]===true).length;
      let pct = (comp/m.lessons.length)*100;
      html += `<div class="module-card" data-module="${m.id}">
        <div class="module-icon">${m.icon}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-progress"><span>${comp}/${m.lessons.length}</span><span>${Math.round(pct)}%</span></div>
        <div class="module-progress-bar"><div class="module-progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }
    document.getElementById("modulesGrid").innerHTML = html;
    document.querySelectorAll(".module-card").forEach(c=>c.addEventListener("click",()=>renderModuleModal(parseInt(c.dataset.module))));
  }

  function renderModuleModal(moduleId) {
    let m = MODULES.find(m=>m.id===moduleId);
    document.getElementById("modalTitle").innerHTML = `${m.icon} Module ${moduleId}: ${m.title}`;
    let body = "";
    for (let i=0; i<m.lessons.length; i++) {
      let l = m.lessons[i];
      let key = `${moduleId}_${i}`;
      let done = appData.completedLessons[key];
      body += `<div class="lesson-item"><div class="lesson-header" data-lesson="${i}">
        <div class="lesson-title"><div class="lesson-check ${done?'completed':''}" data-module="${moduleId}" data-lesson="${i}">${done?'✓':'○'}</div><span>${l.title}</span></div>
        <span class="expand-icon"><i class="fas fa-chevron-down"></i></span>
      </div><div class="lesson-content" id="lc${i}">`;
      if (l.vocab) { body += `<div class="vocab-grid">` + l.vocab.map(v=>`<div class="vocab-card"><div class="vocab-german">${v.de}</div><div class="vocab-english">${v.en}</div></div>`).join('') + `</div>`; }
      if (l.grammar) body += `<div class="grammar-box"><i class="fas fa-lightbulb"></i> <strong>Grammar:</strong> ${l.grammar}</div>`;
      if (l.examples) body += `<div class="examples">` + l.examples.map(e=>`<div class="example-item"><span class="german">${e.de}</span> → ${e.en}</div>`).join('') + `</div>`;
      if (l.exercise) body += `<div class="exercise"><strong>✏️ Practice:</strong> ${l.exercise.q}<br><input type="text" class="exercise-input" id="exIn${moduleId}_${i}" placeholder="Type your answer..."><button class="btn" style="margin-top:8px;" onclick="checkEx(${moduleId},${i})">Check Answer</button><div id="exFb${moduleId}_${i}"></div></div>`;
      body += `</div></div>`;
    }
    document.getElementById("modalBody").innerHTML = body;
    for (let i=0; i<m.lessons.length; i++) {
      let h = document.querySelector(`.lesson-header[data-lesson="${i}"]`);
      if (h) h.addEventListener("click",(e)=>{ if(!e.target.closest('.lesson-check')){ let c=document.getElementById(`lc${i}`); c.classList.toggle("active"); } });
      let ch = document.querySelector(`.lesson-check[data-module="${moduleId}"][data-lesson="${i}"]`);
      if (ch) ch.addEventListener("click",(e)=>{ e.stopPropagation(); toggleLesson(moduleId,i); });
    }
    document.getElementById("moduleModal").classList.add("active");
  }

  window.checkEx = function(mid, lid) {
    let m = MODULES.find(m=>m.id===mid);
    let ans = document.getElementById(`exIn${mid}_${lid}`).value.trim().toLowerCase();
    let correct = m.lessons[lid].exercise.a.toLowerCase();
    let fb = document.getElementById(`exFb${mid}_${lid}`);
    if (ans === correct) { fb.innerHTML = "✅ Perfect! Great job!"; fb.style.color="#81c784"; canvasConfetti({particleCount:30,spread:40}); }
    else { fb.innerHTML = `❌ The correct answer is: "${m.lessons[lid].exercise.a}". Keep practicing!`; fb.style.color="#ff9800"; }
  };

  function renderDailyTasks() {
    let html = "";
    DAILY_TASKS.forEach((t,i)=> { let done=appData.dailyTasks[i]; html+=`<div class="daily-task ${done?'completed':''}" data-task="${i}"><span class="task-icon">${t.icon}</span><span>${t.name}</span>${done?' ✓':''}</div>`; });
    document.getElementById("dailyTasks").innerHTML = html;
    document.querySelectorAll(".daily-task").forEach(el=>el.addEventListener("click",()=>toggleDailyTask(parseInt(el.dataset.task))));
  }

  function refreshUI() {
    let comp = getCompletedCount(), total = getTotalLessons(), pct = total?Math.floor(comp/total*100):0;
    document.getElementById("xpValue").innerText = appData.xp;
    document.getElementById("streakValue").innerText = appData.streak;
    document.getElementById("lessonsCompleted").innerHTML = `${comp}/${total}`;
    document.getElementById("progressPercent").innerText = pct+"%";
    document.getElementById("globalProgress").style.width = pct+"%";
    let level = appData.xp<500?"🌱":appData.xp<1000?"🍃":appData.xp<2000?"🌿":appData.xp<3500?"🌳":"🌲";
    document.getElementById("levelValue").innerHTML = level;
  }

  function showToast(msg) {
    let t = document.createElement("div"); t.className="toast"; t.innerHTML=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2500);
  }

  // Event listeners
  document.querySelectorAll(".close-modal").forEach(b=>b.addEventListener("click",()=>document.getElementById("moduleModal").classList.remove("active")));
  window.addEventListener("click",(e)=>{if(e.target===document.getElementById("moduleModal")) document.getElementById("moduleModal").classList.remove("active");});
  document.getElementById("saveReflectionBtn").addEventListener("click",saveReflection);
  document.getElementById("resetDailyBtn").addEventListener("click",()=>{for(let i=0;i<DAILY_TASKS.length;i++)appData.dailyTasks[i]=false;save();renderDailyTasks();refreshUI();showToast("Daily tasks reset!");});

  load();
  renderModules();
  renderDailyTasks();
  refreshUI();
</script>
</body>
</html>
